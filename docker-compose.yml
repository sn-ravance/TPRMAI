version: "3.8"

services:
  # ---------- Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tprmai-app
    ports:
      - "127.0.0.1:3020:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tprm_user}:${POSTGRES_PASSWORD:-tprm_pass}@db:5432/${POSTGRES_DB:-tprm_db}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3020}
      - NODE_ENV=production
      # OIDC -- issuer must use Docker-internal address (not localhost)
      - OIDC_ISSUER_URL=${OIDC_INTERNAL_ISSUER_URL:-http://mock-oidc:10090}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
      - JWT_SECRET=${JWT_SECRET:-docker-dev-jwt-secret-not-for-production}
      # AI Provider (wired in Phase C)
      # - AI_PROVIDER=anthropic_foundry
      # - AZURE_OPENAI_ENDPOINT=
      # - AZURE_OPENAI_DEPLOYMENT_NAME=
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://127.0.0.1:3000',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    container_name: tprmai-db
    ports:
      - "127.0.0.1:5438:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tprm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tprm_pass}
      - POSTGRES_DB=${POSTGRES_DB:-tprm_db}
    volumes:
      - tprmai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tprm_user -d tprm_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- Mock OIDC (dev profile) ----------
  mock-oidc:
    build:
      context: ./mock-services/mock-oidc
      dockerfile: Dockerfile
    container_name: tprmai-mock-oidc
    profiles:
      - dev
    ports:
      - "127.0.0.1:10091:10090"
    environment:
      - MOCK_OIDC_PORT=10090
      - MOCK_OIDC_EXTERNAL_BASE_URL=${MOCK_OIDC_EXTERNAL_BASE_URL:-http://localhost:10091}
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tprmai-pgdata:
